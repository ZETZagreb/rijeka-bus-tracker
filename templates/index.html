<!DOCTYPE html>
<html>
<head>
    <title>Autotrolej Rijeka Live</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        .bus-label {
            width: 45px; height: 40px; border: 2px solid #333; border-radius: 6px;
            overflow: hidden; display: flex; flex-direction: column; font-family: Arial, sans-serif;
            background: white;
        }
    </style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([45.3271, 14.4422], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    var markers = {};

    function update() {
        fetch('/api/buses/rijeka')
            .then(res => res.json())
            .then(data => {
                if(!data.vehicles || !Array.isArray(data.vehicles)) return;
                var currentIds = data.vehicles.map(v => v.garazniBroj);

                data.vehicles.forEach(bus => {
                    var id = bus.garazniBroj;
                    var linija = bus.linija;
                    var lat = bus.latituda;
                    var lon = bus.longituda;

                    if (lat && lon && id) {
                        var html = `<div class="bus-label">
                            <div style="color:#ff6600; height:20px; line-height:20px; font-weight:bold; text-align:center; font-size:13px;">${linija}</div>
                            <div style="background:#ff6600; color:white; height:20px; line-height:20px; font-weight:bold; text-align:center; font-size:11px;">${id}</div>
                        </div>`;
                        var icon = L.divIcon({ html: html, className: '', iconSize: [45, 40], iconAnchor: [22, 20] });
                        
                        if (markers[id]) {
                            markers[id].setLatLng([lat, lon]);
                        } else {
                            markers[id] = L.marker([lat, lon], {icon: icon}).addTo(map);
                        }
                    }
                });

                Object.keys(markers).forEach(k => {
                    if (!currentIds.includes(parseInt(k))) {
                        map.removeLayer(markers[k]);
                        delete markers[k];
                    }
                });
            });
    }
    setInterval(update, 5000);
    update();
</script>
</body>
</html>
