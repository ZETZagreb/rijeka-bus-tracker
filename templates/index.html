<!DOCTYPE html>
<html>
<head>
    <title>Autotrolej Rijeka Live</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; }
        #map { height: 100vh; width: 100%; }
        .bus-label {
            width: 45px; height: 40px; border: 2px solid #333; border-radius: 6px;
            background: white; display: flex; flex-direction: column; font-family: Arial;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([45.3271, 14.4422], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var markers = {};

        function update() {
            fetch('/api/buses/rijeka')
                .then(res => res.json())
                .then(data => {
                    if (!data.vehicles) return;
                    var activeGbrs = data.vehicles.map(v => v.garageNumber);
                    
                    data.vehicles.forEach(bus => {
                        // Riječka narančasta boja
                        var html = `<div class="bus-label">
                            <div style="color:#ff6600; height:20px; font-weight:bold; text-align:center;">${bus.name}</div>
                            <div style="background:#ff6600; color:white; height:20px; text-align:center; font-size:11px;">${bus.garageNumber}</div>
                        </div>`;
                        
                        var icon = L.divIcon({ html: html, className: '', iconSize: [45, 40] });
                        
                        if (markers[bus.garageNumber]) {
                            markers[bus.garageNumber].setLatLng([bus.latitude, bus.longitude]);
                        } else {
                            markers[bus.garageNumber] = L.marker([bus.latitude, bus.longitude], {icon: icon}).addTo(map);
                        }
                        markers[bus.garageNumber].bindPopup(`Linija: ${bus.name}<br>Gbr: ${bus.garageNumber}<br>Brzina: ${bus.speed} km/h`);
                    });

                    for (var g in markers) {
                        if (!activeGbrs.includes(g)) {
                            map.removeLayer(markers[g]);
                            delete markers[g];
                        }
                    }
                });
        }
        setInterval(update, 5000);
        update();
    </script>
</body>
</html>
