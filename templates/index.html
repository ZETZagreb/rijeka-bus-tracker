<!DOCTYPE html>
<html>
<head>
    <title>Autotrolej Rijeka Live</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        .bus-label {
            width: 45px; height: 40px; border: 2px solid #333; border-radius: 6px;
            overflow: hidden; display: flex; flex-direction: column; font-family: Arial, sans-serif;
            background: white;
        }
    </style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([45.3271, 14.4422], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    var markers = {};

    function connect() {
        // Direktan spoj na Autotrolej WebSocket koji si uslikao u Network tabu
        var socket = new WebSocket('wss://api.autotrolej.hr/api/open/v1/voznired/lokacije');

        socket.onmessage = function(event) {
            var data = JSON.parse(event.data);
            // WebSocket nekad šalje jedan bus, nekad listu - ovo pokriva oboje
            var buses = Array.isArray(data) ? data : [data];

            buses.forEach(bus => {
                var id = bus.garazniBroj;
                var linija = bus.linija;
                var lat = bus.latituda;
                var lon = bus.longituda;

                if (lat && lon && id) {
                    var html = `<div class="bus-label">
                        <div style="color:#ff6600; height:20px; line-height:20px; font-weight:bold; text-align:center; font-size:13px;">${linija}</div>
                        <div style="background:#ff6600; color:white; height:20px; line-height:20px; font-weight:bold; text-align:center; font-size:11px;">${id}</div>
                    </div>`;
                    var icon = L.divIcon({ html: html, className: '', iconSize: [45, 40], iconAnchor: [22, 20] });
                    
                    if (markers[id]) {
                        markers[id].setLatLng([lat, lon]);
                    } else {
                        markers[id] = L.marker([lat, lon], {icon: icon}).addTo(map);
                    }
                    
                    markers[id].bindPopup("Linija: " + linija + "<br>GBR: " + id);
                }
            });
        };

        socket.onclose = function() {
            setTimeout(connect, 2000);
        };
        
        socket.onerror = function(err) {
            console.error("Socket error: ", err);
        };
    }

    connect();
</script>
</body>
</html>
