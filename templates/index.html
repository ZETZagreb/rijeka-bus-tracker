<!DOCTYPE html>
<html>
<head>
    <title>Autotrolej Rijeka Live</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        .bus-label {
            width: 45px; height: 40px; border: 2px solid #333; border-radius: 6px;
            overflow: hidden; display: flex; flex-direction: column; font-family: 'Arial Black', sans-serif;
        }
        .bus-top { background: white; color: #ff6600; height: 20px; line-height: 20px; font-weight: bold; font-size: 13px; text-align: center; }
        .bus-bottom-diesel { background: #f5f5dc; color: #ff6600; height: 20px; line-height: 20px; font-weight: bold; font-size: 11px; text-align: center; }
        .bus-bottom-cng { background: #87ceeb; color: #ff6600; height: 20px; line-height: 20px; font-weight: bold; font-size: 11px; text-align: center; }
    </style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([45.3271, 14.4422], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    var markers = {};
    var stopMarkers = L.layerGroup().addTo(map);
    var routeLine = L.polyline([], {color: '#ff6600', weight: 5}).addTo(map);

    function loadStops() {
        fetch('/api/stops/rijeka')
            .then(res => res.json())
            .then(stops => {
                stops.forEach(stop => {
                    L.circleMarker([stop.latitude, stop.longitude], {
                        radius: 5, color: '#0078ff', fillColor: 'white', fillOpacity: 1
                    }).addTo(stopMarkers).bindPopup("<b>Stanica: " + stop.name + "</b>");
                });
            });
    }

    function updateBuses() {
        fetch('/api/buses/rijeka')
            .then(res => res.json())
            .then(data => {
                var currentGbrs = data.vehicles.map(v => v.garageNumber);
                data.vehicles.forEach(bus => {
                    var colorClass = bus.type === 'cng' ? 'bus-bottom-cng' : 'bus-bottom-diesel';
                    var labelContent = `<div class="bus-label"><div class="bus-top">${bus.name}</div><div class="${colorClass}">${bus.garageNumber}</div></div>`;
                    var icon = L.divIcon({ html: labelContent, className: '', iconSize: [45, 40], iconAnchor: [22, 20] });
                    
                    if (markers[bus.garageNumber]) {
                        markers[bus.garageNumber].setLatLng([bus.latitude, bus.longitude]);
                    } else {
                        markers[bus.garageNumber] = L.marker([bus.latitude, bus.longitude], {icon: icon}).addTo(map);
                    }
                    
                    markers[bus.garageNumber].bindPopup(`<b>Linija: ${bus.name}</b><br>Odredište: ${bus.destination}<br>Reg: ${bus.registration}<br>Gbr: ${bus.garageNumber}<br>Brzina: ${bus.speed} km/h`);
                    
                    markers[bus.garageNumber].on('click', () => {
                        // Ovdje bi išao poziv za rutu ako API podržava koordinate linije
                        routeLine.setLatLngs([[bus.latitude, bus.longitude]]); 
                    });
                });
                for (var gbr in markers) { if (!currentGbrs.includes(gbr)) { map.removeLayer(markers[gbr]); delete markers[gbr]; } }
            });
    }

    loadStops();
    setInterval(updateBuses, 5000);
    updateBuses();
</script>
</body>
</html>
