<!DOCTYPE html>
<html>
<head>
    <title>Autotrolej Rijeka Live</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        .bus-label {
            width: 45px; height: 40px; border: 2px solid #333; border-radius: 6px;
            overflow: hidden; display: flex; flex-direction: column; font-family: Arial, sans-serif;
            background: white;
        }
    </style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([45.3271, 14.4422], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    var markers = {};

    function update() {
        fetch('/api/buses/rijeka')
            .then(res => res.json())
            .then(data => {
                let list = data.vehicles;
                if (!list || !Array.isArray(list)) return;

                let activeIds = [];

                list.forEach(item => {
                    let v = item.vehicle || item;
                    let id = v.vehicle ? v.vehicle.id : (v.gbr || v.id);
                    let pos = v.position || v;
                    let lat = pos.latitude || pos.lat;
                    let lon = pos.longitude || pos.lon;
                    let line = v.trip ? v.trip.route_id : (v.linija || v.line || "??");

                    if (lat && lon && id) {
                        activeIds.push(id.toString());
                        let html = `<div class="bus-label">
                            <div style="color:#ff6600; height:20px; line-height:20px; font-weight:bold; text-align:center; font-size:13px;">${line}</div>
                            <div style="background:#ff6600; color:white; height:20px; line-height:20px; font-weight:bold; text-align:center; font-size:11px;">${id}</div>
                        </div>`;
                        let icon = L.divIcon({ html: html, className: '', iconSize: [45, 40], iconAnchor: [22, 20] });
                        
                        if (markers[id]) {
                            markers[id].setLatLng([lat, lon]);
                        } else {
                            markers[id] = L.marker([lat, lon], {icon: icon}).addTo(map);
                        }
                    }
                });

                Object.keys(markers).forEach(k => {
                    if (!activeIds.includes(k)) {
                        map.removeLayer(markers[k]);
                        delete markers[k];
                    }
                });
            });
    }
    setInterval(update, 5000);
    update();
</script>
</body>
</html>
