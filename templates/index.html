<!DOCTYPE html>
<html>
<head>
    <title>Autotrolej Rijeka Live</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        .bus-label {
            width: 45px; height: 40px; border: 2px solid #333; border-radius: 6px;
            overflow: hidden; display: flex; flex-direction: column; font-family: Arial, sans-serif;
            background: white;
        }
    </style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([45.3271, 14.4422], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    var markers = {};

    function updateBuses() {
        fetch('/api/buses/rijeka')
            .then(res => res.json())
            .then(data => {
                if(!data.vehicles) return;
                var currentGbrs = data.vehicles.map(v => v.garageNumber);
                
                data.vehicles.forEach(bus => {
                    var html = `
                        <div class="bus-label">
                            <div style="color:#ff6600; height:20px; line-height:20px; font-weight:bold; text-align:center; font-size:13px;">${bus.name}</div>
                            <div style="background:#ff6600; color:white; height:20px; line-height:20px; font-weight:bold; text-align:center; font-size:11px;">${bus.garageNumber}</div>
                        </div>`;
                    
                    var icon = L.divIcon({ html: html, className: '', iconSize: [45, 40], iconAnchor: [22, 20] });
                    
                    if (markers[bus.garageNumber]) {
                        markers[bus.garageNumber].setLatLng([bus.latitude, bus.longitude]);
                    } else {
                        markers[bus.garageNumber] = L.marker([bus.latitude, bus.longitude], {icon: icon}).addTo(map);
                    }
                    
                    markers[bus.garageNumber].bindPopup(`
                        <b>Linija ${bus.name}</b><br>
                        <b>Odredište: ${bus.destination}</b><hr>
                        Garažni broj: ${bus.garageNumber}
                    `);
                });

                // Ukloni autobuse koji više nisu aktivni
                for (var gbr in markers) {
                    if (!currentGbrs.includes(gbr)) {
                        map.removeLayer(markers[gbr]);
                        delete markers[gbr];
                    }
                }
            });
    }

    setInterval(updateBuses, 5000);
    updateBuses();
</script>
</body>
</html>
